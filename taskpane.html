<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TextFormatter</title>
<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js" type="text/javascript"></script>
<style>
body { font-family: Arial, sans-serif; font-size: 14px; padding: 10px; background: #f5f5f5; }
h2 { font-size: 16px; margin-bottom: 12px; color: #333; }
button {
  display: block; width: 100%; padding: 10px;
  margin-bottom: 8px; font-size: 13px; font-weight: bold;
  border: none; border-radius: 6px; cursor: pointer;
}
.b1 { background: #4a4ae8; color: white; }
.b2 { background: #e84a4a; color: white; }
.b3 { background: #2ecc71; color: #333; }
.b4 { background: #888; color: white; }
hr { margin: 12px 0; border: none; border-top: 1px solid #ccc; }
input {
  width: 100%; padding: 7px; margin-bottom: 6px;
  border: 1px solid #ccc; border-radius: 4px; font-size: 13px;
  box-sizing: border-box;
}
.tags { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 6px; }
.tag {
  background: #e0e0ff; border: 1px solid #aaa;
  border-radius: 12px; padding: 3px 10px;
  font-size: 12px; cursor: pointer;
}
.tag:hover { background: #4a4ae8; color: white; }
#status {
  margin-top: 8px; padding: 8px; border-radius: 4px;
  font-size: 12px; display: none;
}
.ok  { background: #d4edda; color: #155724; }
.err { background: #f8d7da; color: #721c24; }
</style>
</head>
<body>

<h2>TextFormatter Pro</h2>

<button class="b1" id="btnPara">¶ Formatar Parágrafo</button>
<button class="b2" id="btnCit">❝ Formatar Citação</button>
<button class="b3" id="btnFont">A Helvetica Neue 12pt</button>

<hr>

<div>
  <strong style="font-size:12px">SINÔNIMOS</strong><br><br>
  <input type="text" id="synWord" placeholder="Digite uma palavra...">
  <button class="b1" id="btnSyn">Buscar Sinônimos</button>
  <div class="tags" id="synTags"></div>
</div>

<hr>

<div>
  <strong style="font-size:12px">SUBSTITUIR</strong><br><br>
  <input type="text" id="repOld" placeholder="Palavra original">
  <input type="text" id="repNew" placeholder="Substituir por">
  <button class="b4" id="btnRep">↔ Substituir</button>
</div>

<div id="status"></div>

<script>
var isReady = false;

Office.initialize = function() {
  isReady = true;
  document.getElementById('btnPara').onclick = doPara;
  document.getElementById('btnCit').doCit;
  document.getElementById('btnFont').onclick = doFont;
  document.getElementById('btnSyn').onclick = doSyn;
  document.getElementById('btnRep').onclick = doRep;
  document.getElementById('btnCit').onclick = doCit;
};

function msg(text, isErr) {
  var el = document.getElementById('status');
  el.textContent = text;
  el.className = isErr ? 'err' : 'ok';
  el.style.display = 'block';
  setTimeout(function() { el.style.display = 'none'; }, 4000);
}

// ── FONTE ──
function doFont() {
  Word.run(function(context) {
    var body = context.document.body;
    body.font.name = 'Helvetica Neue';
    body.font.size = 12;
    return context.sync();
  }).then(function() {
    msg('Fonte aplicada: Helvetica Neue 12pt');
  }).catch(function(e) {
    msg('Erro: ' + e.message, true);
  });
}

// ── PARÁGRAFO ──
// Primeira linha: 1,25cm = 35.43pt
// Espaçamento: 1,5 linhas = lineSpacing 18
// Antes/Depois: 0
// Esquerda/Direita: 0
// Alinhamento: justificado
function doPara() {
  Word.run(function(context) {
    var paragraphs = context.document.body.paragraphs;
    context.load(paragraphs, 'items');
    return context.sync().then(function() {
      for (var i = 0; i < paragraphs.items.length; i++) {
        var p = paragraphs.items[i];
        p.firstLineIndent = 35.43;
        p.leftIndent      = 0;
        p.rightIndent     = 0;
        p.lineSpacing     = 18;
        p.spaceBefore     = 0;
        p.spaceAfter      = 0;
        p.alignment       = Word.Alignment.justified;
      }
      return context.sync();
    });
  }).then(function() {
    msg('Parágrafos formatados!');
  }).catch(function(e) {
    msg('Erro parágrafo: ' + e.message, true);
  });
}

// ── CITAÇÃO ──
// Esq/Dir: 1cm = 28.35pt
// Espaçamento simples = 12pt
// Sem recuo primeira linha
// Antes/Depois: 0
// Alinhamento: justificado
function doCit() {
  Word.run(function(context) {
    var selection = context.document.getSelection();
    context.load(selection, 'text');
    return context.sync().then(function() {
      if (!selection.text || selection.text.trim() === '') {
        msg('Selecione o texto da citação primeiro.', true);
        return context.sync();
      }
      var paragraphs = selection.paragraphs;
      context.load(paragraphs, 'items');
      return context.sync().then(function() {
        for (var i = 0; i < paragraphs.items.length; i++) {
          var p = paragraphs.items[i];
          p.firstLineIndent = 0;
          p.leftIndent      = 28.35;
          p.rightIndent     = 28.35;
          p.lineSpacing     = 12;
          p.spaceBefore     = 0;
          p.spaceAfter      = 0;
          p.alignment       = Word.Alignment.justified;
        }
        return context.sync();
      });
    });
  }).then(function() {
    msg('Citação formatada!');
  }).catch(function(e) {
    msg('Erro citação: ' + e.message, true);
  });
}

// ── SINÔNIMOS ──
function doSyn() {
  var word = document.getElementById('synWord').value.trim();
  if (!word) { msg('Digite uma palavra.', true); return; }

  document.getElementById('synTags').innerHTML = 'Buscando...';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 200,
      system: 'Responda APENAS JSON: {"s":["palavra1","palavra2",...]} com 8 sinônimos em português. Sem markdown.',
      messages: [{ role: 'user', content: 'Sinônimos de: ' + word }]
    })
  }).then(function(r) { return r.json(); })
  .then(function(d) {
    var txt = d.content[0].text.replace(/```json|```/g, '').trim();
    var obj = JSON.parse(txt);
    showSyn(obj.s || [], word);
  }).catch(function() {
    showSyn(['similar','análogo','equivalente','correlato','semelhante','afim'], word);
  });
}

function showSyn(list, original) {
  var wrap = document.getElementById('synTags');
  wrap.innerHTML = '';
  list.forEach(function(s) {
    var t = document.createElement('span');
    t.className = 'tag';
    t.textContent = s;
    t.onclick = function() { useSyn(s, original); };
    wrap.appendChild(t);
  });
}

function useSyn(syn, original) {
  Word.run(function(context) {
    var sel = context.document.getSelection();
    context.load(sel, 'text');
    return context.sync().then(function() {
      if (sel.text.trim().toLowerCase() === original.toLowerCase()) {
        sel.insertText(syn, Word.InsertLocation.replace);
        return context.sync();
      }
      var results = context.document.body.search(original, { matchCase: false, matchWholeWord: true });
      context.load(results, 'items');
      return context.sync().then(function() {
        if (results.items.length > 0) {
          results.items[0].insertText(syn, Word.InsertLocation.replace);
        }
        return context.sync();
      });
    });
  }).then(function() {
    msg(original + ' → ' + syn);
  }).catch(function(e) {
    msg('Erro: ' + e.message, true);
  });
}

// ── SUBSTITUIR ──
function doRep() {
  var orig = document.getElementById('repOld').value.trim();
  var sub  = document.getElementById('repNew').value.trim();
  if (!orig || !sub) { msg('Preencha os dois campos.', true); return; }
  Word.run(function(context) {
    var results = context.document.body.search(orig, { matchCase: false, matchWholeWord: true });
    context.load(results, 'items');
    return context.sync().then(function() {
      if (results.items.length === 0) { msg('Palavra não encontrada.', true); return context.sync(); }
      results.items[0].insertText(sub, Word.InsertLocation.replace);
      return context.sync();
    });
  }).then(function() {
    msg('Substituído com sucesso!');
  }).catch(function(e) {
    msg('Erro: ' + e.message, true);
  });
}
</script>
</body>
</html>
