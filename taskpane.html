<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TextFormatter Pro</title>
<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
<style>
body { font-family: Arial, sans-serif; padding: 12px; background: #fff; }
button { display:block; width:100%; padding:10px; margin-bottom:8px; font-size:13px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; }
.t1 { background:#ffcc00; color:#000; }
.t2 { background:#4a4ae8; color:#fff; }
.t3 { background:#e84a4a; color:#fff; }
.t4 { background:#2ecc71; color:#000; }
#log { background:#f5f5f5; border:1px solid #ccc; border-radius:5px; padding:10px; font-size:12px; min-height:60px; margin-top:10px; white-space:pre-wrap; }
</style>
</head>
<body>

<button class="t1" id="b0">1. TESTE JS PURO (sem Word)</button>
<button class="t2" id="b1">2. TESTE Office.context</button>
<button class="t3" id="b2">3. TESTE Word.run</button>
<button class="t4" id="b3">4. FORMATAR PARÁGRAFO</button>

<div id="log">Aguardando clique...</div>

<script>
function log(msg) {
  document.getElementById('log').textContent = new Date().toLocaleTimeString() + ' — ' + msg;
}

// Botão 1: puro JS, sem Office
document.getElementById('b0').onclick = function() {
  log('JS funcionando! Office.context existe: ' + (typeof Office !== "undefined"));
};

// Botão 2: testa Office.context
document.getElementById('b1').onclick = function() {
  try {
    if (typeof Office === 'undefined') { log('ERRO: Office não carregou'); return; }
    log('Office carregado. Host: ' + (Office.context ? Office.context.host : 'N/A') + ' | requirements: ' + (Office.requirements ? 'sim' : 'nao'));
  } catch(e) { log('ERRO: ' + e.message); }
};

// Botão 3: testa Word.run
document.getElementById('b2').onclick = function() {
  try {
    if (typeof Word === 'undefined') { log('ERRO: Word não definido'); return; }
    Word.run(function(ctx) {
      log('Word.run iniciou...');
      return ctx.sync().then(function() {
        log('ctx.sync() OK! Word está respondendo.');
      });
    }).catch(function(e) { log('Word.run ERRO: ' + e.message); });
  } catch(e) { log('ERRO geral: ' + e.message); }
};

// Botão 4: formata parágrafo
document.getElementById('b3').onclick = function() {
  try {
    Word.run(function(ctx) {
      var ps = ctx.document.body.paragraphs;
      ctx.load(ps, 'items');
      return ctx.sync().then(function() {
        log('Parágrafos encontrados: ' + ps.items.length);
        for (var i = 0; i < ps.items.length; i++) {
          ps.items[i].firstLineIndent = 35.43;
          ps.items[i].leftIndent      = 0;
          ps.items[i].rightIndent     = 0;
          ps.items[i].lineSpacing     = 18;
          ps.items[i].spaceBefore     = 0;
          ps.items[i].spaceAfter      = 0;
          ps.items[i].alignment       = Word.Alignment.justified;
        }
        return ctx.sync().then(function() {
          log('SUCESSO! ' + ps.items.length + ' parágrafos formatados.');
        });
      });
    }).catch(function(e) { log('ERRO Word.run: ' + e.message); });
  } catch(e) { log('ERRO: ' + e.message); }
};

// Log quando Office estiver pronto
Office.onReady(function(info) {
  log('Office.onReady disparou! Host: ' + info.host + ' | Platform: ' + info.platform);
});
</script>
</body>
</html>
