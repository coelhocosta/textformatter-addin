<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TextFormatter Pro</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
:root{--bg:#0f0f13;--s2:#22222e;--bd:#2e2e3e;--ac:#6c63ff;--ac2:#ff6b6b;--ac3:#43e97b;--tx:#e8e8f0;--mt:#7a7a9a}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:13px}
.hdr{background:linear-gradient(135deg,#1a1a2e,#0f3460);padding:14px;border-bottom:1px solid var(--bd)}
.hdr h1{font-size:15px;font-weight:700;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{font-size:10px;color:var(--mt);margin-top:2px}
.sec{padding:10px 14px;border-bottom:1px solid var(--bd)}
.st{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--mt);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.st::after{content:'';flex:1;height:1px;background:var(--bd)}
.btn{width:100%;padding:9px 12px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:6px;transition:transform .15s}
.bp{background:linear-gradient(135deg,#6c63ff,#5a52d5);color:#fff;box-shadow:0 3px 12px rgba(108,99,255,.3)}
.br{background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:#fff;box-shadow:0 3px 12px rgba(255,107,107,.3)}
.bo{background:linear-gradient(135deg,#43e97b,#38d66e);color:#0f0f13;box-shadow:0 3px 12px rgba(67,233,123,.3)}
.bx{background:var(--s2);color:var(--tx);border:1px solid var(--bd)}
.bp:hover,.br:hover,.bo:hover,.bx:hover{transform:translateY(-1px)}
.ifield{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--tx);font-size:12px;padding:8px 10px;outline:none;margin-bottom:6px;font-family:inherit}
.ifield:focus{border-color:var(--ac)}
.row{display:flex;gap:6px;margin-bottom:6px}
.row .ifield{margin-bottom:0}
.bsm{width:auto;padding:8px 12px;margin:0;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:5px;min-height:24px;margin-top:4px}
.tag{background:var(--s2);border:1px solid var(--bd);border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .15s}
.tag:hover,.tag.on{background:var(--ac);border-color:var(--ac);color:#fff}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:9px 16px;font-size:12px;z-index:9999;transition:transform .25s;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.tok{border-color:var(--ac3)}.ter{border-color:var(--ac2)}.tin{border-color:var(--ac)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lbl{font-size:11px;color:var(--mt);margin-bottom:5px}
.lbl span{color:#a78bfa;font-weight:600}
</style>
</head>
<body>

<div class="hdr">
  <h1>✦ TextFormatter Pro</h1>
  <p>Formatação ABNT · Sinônimos · Word for Mac</p>
</div>

<div class="sec">
  <div class="st">Formatação</div>
  <button class="btn bp" onclick="fmtPara()">¶ &nbsp;Parágrafos (1,25cm · Esp. 1,5)</button>
  <button class="btn br" onclick="fmtCit()">❝ &nbsp;Citações (Recuo 1cm · Simples)</button>
  <button class="btn bo" onclick="fmtFont()">A &nbsp;Helvetica Neue 12pt</button>
</div>

<div class="sec">
  <div class="st">Sinônimos</div>
  <div class="lbl">Selecionado: <span id="sw">—</span></div>
  <div class="row">
    <input class="ifield" id="si" placeholder="Digite ou selecione uma palavra..."/>
    <button class="btn bp bsm" onclick="getSyn()">Buscar</button>
  </div>
  <div id="sl" style="display:none;font-size:11px;color:var(--mt);padding:4px 0">
    <span class="spin"></span> Buscando...
  </div>
  <div class="tags" id="st2"><span style="color:var(--mt);font-size:11px">Sinônimos aqui...</span></div>
</div>

<div class="sec">
  <div class="st">Substituir</div>
  <div class="row">
    <input class="ifield" id="ro" placeholder="Palavra original"/>
    <input class="ifield" id="rn" placeholder="Substituir por"/>
  </div>
  <button class="btn bx" onclick="doRep()">↔ &nbsp;Substituir</button>
</div>

<div class="toast" id="toast"></div>

<script>
Office.onReady(function(info){
  if(info.host === Office.HostType.Word){
    setInterval(detSel, 2000);
  }
});

// ── toast ──
var _tt;
function toast(msg, cls){
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + (cls||'tin');
  clearTimeout(_tt);
  _tt = setTimeout(function(){ el.classList.remove('show'); }, 3000);
}

// ── detecta seleção ──
function detSel(){
  Word.run(function(ctx){
    var s = ctx.document.getSelection();
    s.load('text');
    return ctx.sync().then(function(){
      var t = s.text.trim();
      if(t && t.split(' ').length <= 5 && t.length < 80){
        document.getElementById('sw').textContent = t;
        document.getElementById('si').value = t;
      }
    });
  }).catch(function(){});
}

// ── fonte ──
function fmtFont(){
  Word.run(function(ctx){
    ctx.document.body.font.name = 'Helvetica Neue';
    ctx.document.body.font.size = 12;
    return ctx.sync();
  }).then(function(){
    toast('✓ Fonte aplicada!','tok');
  }).catch(function(e){
    toast('Erro: ' + e.message,'ter');
  });
}

// ── parágrafos ──
// recuo 1ª linha 1,25cm = 35.43pt
// espaçamento 1,5 = lineSpacing 18pt
// esquerda/direita = 0
// antes/depois = 0
// justificado
function fmtPara(){
  Word.run(function(ctx){
    var paras = ctx.document.body.paragraphs;
    paras.load('items');
    return ctx.sync().then(function(){
      for(var i=0; i<paras.items.length; i++){
        var p = paras.items[i];
        p.alignment       = Word.Alignment.justified;
        p.firstLineIndent = 35.43;
        p.leftIndent      = 0;
        p.rightIndent     = 0;
        p.lineSpacing     = 18;
        p.spaceBefore     = 0;
        p.spaceAfter      = 0;
      }
      return ctx.sync();
    });
  }).then(function(){
    toast('✓ Parágrafos formatados!','tok');
  }).catch(function(e){
    toast('Erro: ' + e.message,'ter');
  });
}

// ── citações ──
// recuo esq/dir 1cm = 28.35pt
// espaçamento simples = lineSpacing 12pt
// sem recuo 1ª linha
// esquerda/direita = 0 (margem do recuo)
// antes/depois = 0
// justificado
function fmtCit(){
  Word.run(function(ctx){
    var sel = ctx.document.getSelection();
    sel.load('text');
    return ctx.sync().then(function(){
      if(!sel.text || !sel.text.trim()){
        toast('Selecione o texto da citação primeiro.','tin');
        return ctx.sync();
      }
      var paras = sel.paragraphs;
      paras.load('items');
      return ctx.sync().then(function(){
        for(var i=0; i<paras.items.length; i++){
          var p = paras.items[i];
          p.alignment       = Word.Alignment.justified;
          p.firstLineIndent = 0;
          p.leftIndent      = 28.35;
          p.rightIndent     = 28.35;
          p.lineSpacing     = 12;
          p.spaceBefore     = 0;
          p.spaceAfter      = 0;
        }
        return ctx.sync();
      });
    });
  }).then(function(){
    toast('✓ Citação formatada!','tok');
  }).catch(function(e){
    toast('Erro: ' + e.message,'ter');
  });
}

// ── sinônimos ──
function getSyn(){
  var word = document.getElementById('si').value.trim();
  if(!word){ toast('Digite uma palavra.','tin'); return; }
  document.getElementById('sl').style.display = 'block';
  document.getElementById('st2').innerHTML = '';
  fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514',
      max_tokens:300,
      system:'Responda APENAS JSON puro sem markdown: {"s":["sin1","sin2",...]} com 8 sinônimos em português.',
      messages:[{role:'user',content:'Sinônimos de: '+word}]
    })
  }).then(function(r){ return r.json(); })
  .then(function(d){
    var txt = d.content.map(function(i){return i.text||'';}).join('');
    var obj = JSON.parse(txt.replace(/```json|```/g,'').trim());
    renderSyn(obj.s||[], word);
  }).catch(function(){
    renderSyn(['similar','análogo','equivalente','correlato','semelhante','afim'], word);
  }).finally(function(){
    document.getElementById('sl').style.display = 'none';
  });
}

function renderSyn(list, original){
  var wrap = document.getElementById('st2');
  wrap.innerHTML = '';
  list.forEach(function(s){
    var t = document.createElement('span');
    t.className = 'tag';
    t.textContent = s;
    t.onclick = function(){ insSyn(s, original, t); };
    wrap.appendChild(t);
  });
}

function insSyn(syn, original, el){
  document.querySelectorAll('.tag').forEach(function(t){ t.classList.remove('on'); });
  el.classList.add('on');
  Word.run(function(ctx){
    var sel = ctx.document.getSelection();
    sel.load('text');
    return ctx.sync().then(function(){
      if(sel.text.trim().toLowerCase() === original.toLowerCase()){
        sel.insertText(syn, Word.InsertLocation.replace);
      } else {
        var r = ctx.document.body.search(original,{matchCase:false,matchWholeWord:true});
        r.load('items');
        return ctx.sync().then(function(){
          if(r.items.length) r.items[0].insertText(syn, Word.InsertLocation.replace);
          return ctx.sync();
        });
      }
      return ctx.sync();
    });
  }).then(function(){
    toast('✓ ' + original + ' → ' + syn,'tok');
  }).catch(function(){
    toast('Selecione a palavra no texto.','tin');
  });
}

// ── substituir ──
function doRep(){
  var orig = document.getElementById('ro').value.trim();
  var sub  = document.getElementById('rn').value.trim();
  if(!orig||!sub){ toast('Preencha os dois campos.','tin'); return; }
  Word.run(function(ctx){
    var r = ctx.document.body.search(orig,{matchCase:false,matchWholeWord:true});
    r.load('items');
    return ctx.sync().then(function(){
      if(!r.items.length){ toast('Palavra não encontrada.','ter'); return ctx.sync(); }
      r.items[0].insertText(sub, Word.InsertLocation.replace);
      return ctx.sync();
    });
  }).then(function(){
    toast('✓ Substituído!','tok');
  }).catch(function(e){
    toast('Erro: '+e.message,'ter');
  });
}
</script>
</body>
</html>
