<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>TextFormatter Pro</title>
<script src="https://appsforoffice.microsoft.com/lib/1.1/hosted/office.js"></script>
<style>
body { font-family: Arial, sans-serif; padding: 12px; background: #fff; }
button { display:block; width:100%; padding:10px; margin-bottom:8px; font-size:13px; font-weight:bold; border:none; border-radius:5px; cursor:pointer; }
.b1 { background:#4a4ae8; color:#fff; }
.b2 { background:#e84a4a; color:#fff; }
.b3 { background:#2ecc71; color:#000; }
.b4 { background:#e8a020; color:#fff; }
.b5 { background:#888; color:#fff; }
#log { background:#f5f5f5; border:1px solid #ccc; border-radius:5px; padding:10px; font-size:12px; min-height:40px; margin-top:10px; }
</style>
</head>
<body>

<button class="b1" id="b1">¶ Formatar Parágrafo (cursor)</button>
<button class="b2" id="b2">❝ Formatar Citação (seleção)</button>
<button class="b3" id="b3">A Helvetica Neue 12pt</button>
<button class="b4" id="b4">🔍 Marcar Espaços Excedentes</button>
<button class="b5" id="b5">✕ Remover Marcações</button>

<div id="log">Pronto.</div>

<canvas id="cv" style="display:none"></canvas>

<script>
function log(t) { document.getElementById('log').textContent = t; }

var LINE_PT = 418;
var cv = document.getElementById('cv').getContext('2d');
cv.font = '12px "Helvetica Neue", Helvetica, Arial, sans-serif';
function mw(s) { return cv.measureText(s).width / 1.333; }

document.getElementById('b1').onclick = function() {
  Word.run(function(ctx) {
    var ps = ctx.document.getSelection().paragraphs;
    ctx.load(ps, 'items');
    return ctx.sync().then(function() {
      for (var i = 0; i < ps.items.length; i++) {
        ps.items[i].firstLineIndent = 35.43;
        ps.items[i].leftIndent      = 0;
        ps.items[i].rightIndent     = 0;
        ps.items[i].lineSpacing     = 18;
        ps.items[i].spaceBefore     = 0;
        ps.items[i].spaceAfter      = 0;
        ps.items[i].alignment       = Word.Alignment.justified;
      }
      return ctx.sync();
    });
  }).then(function() { log('OK: Parágrafo formatado!'); })
  .catch(function(e) { log('ERRO: ' + e.message); });
};

document.getElementById('b2').onclick = function() {
  Word.run(function(ctx) {
    var sel = ctx.document.getSelection();
    ctx.load(sel, 'text');
    return ctx.sync().then(function() {
      if (!sel.text || !sel.text.trim()) { log('Selecione o texto da citação.'); return ctx.sync(); }
      var ps = sel.paragraphs;
      ctx.load(ps, 'items');
      return ctx.sync().then(function() {
        for (var i = 0; i < ps.items.length; i++) {
          ps.items[i].firstLineIndent = 0;
          ps.items[i].leftIndent      = 28.35;
          ps.items[i].rightIndent     = 28.35;
          ps.items[i].lineSpacing     = 12;
          ps.items[i].spaceBefore     = 0;
          ps.items[i].spaceAfter      = 0;
          ps.items[i].alignment       = Word.Alignment.justified;
        }
        return ctx.sync();
      });
    });
  }).then(function() { log('OK: Citação formatada!'); })
  .catch(function(e) { log('ERRO: ' + e.message); });
};

document.getElementById('b3').onclick = function() {
  Word.run(function(ctx) {
    ctx.document.body.font.name = 'Helvetica Neue';
    ctx.document.body.font.size = 12;
    return ctx.sync();
  }).then(function() { log('OK: Fonte aplicada!'); })
  .catch(function(e) { log('ERRO: ' + e.message); });
};

document.getElementById('b4').onclick = function() {
  Word.run(function(ctx) {
    // Lê as margens e tamanho de página do documento
    var sec = ctx.document.sections;
    ctx.load(sec, 'items');
    return ctx.sync().then(function() {
      var s = sec.items[0];
      ctx.load(s, 'bodyWidth, leftMargin, rightMargin');
      return ctx.sync().then(function() {
        // bodyWidth já é a largura do texto (página - margens), em pontos
        // Desconta o recuo de primeira linha do parágrafo (1,25cm = 35.43pt)
        var lineWidth = s.bodyWidth - 35.43;
        log('Largura da linha: ' + Math.round(lineWidth) + 'pt — calculando...');

        var sel = ctx.document.getSelection();
        ctx.load(sel, 'text');
        return ctx.sync().then(function() {
          var ps = (sel.text && sel.text.trim()) ? sel.paragraphs : ctx.document.body.paragraphs;
          ctx.load(ps, 'items');
          return ctx.sync().then(function() {
            var bangW  = mw('!');
            var marked = 0;
            var pi     = 0;

            function nextPara() {
              if (pi >= ps.items.length) {
                return ctx.sync().then(function() {
                  log(marked > 0 ? 'OK: ' + marked + ' linha(s) marcadas.' : 'OK: Sem espaços excedentes.');
                });
              }
              var p = ps.items[pi++];
              ctx.load(p, 'text, firstLineIndent, leftIndent');
              return ctx.sync().then(function() {
                var raw = (p.text || '').replace(/[
]+/g, ' ').replace(/ +/g, ' ').trim();
                if (!raw) return nextPara();

                // Largura real da linha para este parágrafo
                // (desconta recuo esquerdo e de primeira linha)
                var paraWidth = s.bodyWidth
                  - (p.leftIndent || 0)
                  - (p.firstLineIndent > 0 ? p.firstLineIndent : 0);

                // Simula quebra de linha
                var words = raw.split(' ').filter(Boolean);
                var lines = [], cur = '';
                for (var w = 0; w < words.length; w++) {
                  var test = cur ? cur + ' ' + words[w] : words[w];
                  if (mw(test) <= paraWidth) { cur = test; }
                  else { if (cur) lines.push(cur); cur = words[w]; }
                }
                if (cur) lines.push(cur);

                // Coleta linhas com espaço excedente
                var targets = [];
                for (var li = 0; li < lines.length - 1; li++) {
                  var rem = paraWidth - mw(lines[li]);
                  if (rem >= bangW) {
                    var n = Math.floor(rem / bangW);
                    var anchor = lines[li].slice(-10).trim();
                    var bangs  = '';
                    for (var x = 0; x < n; x++) bangs += '!';
                    if (anchor && bangs) targets.push({ anchor: anchor, bangs: bangs });
                  }
                }
                if (!targets.length) return nextPara();

                var ti = 0;
                function nextTarget() {
                  if (ti >= targets.length) return nextPara();
                  var tgt = targets[ti++];

                  var res = p.search(tgt.anchor, { matchCase: false, matchWholeWord: false });
                  ctx.load(res, 'items');
                  return ctx.sync().then(function() {
                    if (!res.items.length) return nextTarget();
                    res.items[res.items.length - 1].insertText(tgt.bangs, 'After');
                    return ctx.sync().then(function() {
                      var find = p.search(tgt.anchor + tgt.bangs, { matchCase: false, matchWholeWord: false });
                      ctx.load(find, 'items');
                      return ctx.sync().then(function() {
                        if (find.items.length) {
                          find.items[find.items.length - 1].font.color = '#CC0000';
                          find.items[find.items.length - 1].font.bold  = true;
                        }
                        marked++;
                        return ctx.sync().then(nextTarget);
                      });
                    });
                  });
                }
                return nextTarget();
              });
            }
            return nextPara();
          });
        });
      });
    });
  }).catch(function(e) { log('ERRO: ' + e.message); });
};

document.getElementById('b5').onclick = function() {
  Word.run(function(ctx) {
    var found = ctx.document.body.search('!', { matchWildcards: false });
    ctx.load(found, 'items');
    return ctx.sync().then(function() {
      for (var i = 0; i < found.items.length; i++) ctx.load(found.items[i], 'font');
      return ctx.sync().then(function() {
        for (var i = 0; i < found.items.length; i++) {
          var c = (found.items[i].font.color || '').replace('#','').toUpperCase();
          if (c === 'CC0000') found.items[i].insertText('', Word.InsertLocation.replace);
        }
        return ctx.sync();
      });
    });
  }).then(function() { log('OK: Marcações removidas!'); })
  .catch(function(e) { log('ERRO: ' + e.message); });
};
</script>
</body>
</html>
