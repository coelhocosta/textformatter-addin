<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>TextFormatter Pro</title>
<script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
<style>
:root {
  --bg:#0f0f13; --surf:#1a1a22; --surf2:#22222e; --bord:#2e2e3e;
  --acc:#6c63ff; --acc2:#ff6b6b; --acc3:#43e97b;
  --txt:#e8e8f0; --muted:#7a7a9a;
  --font:-apple-system,BlinkMacSystemFont,'SF Pro Display',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--txt);font-family:var(--font);font-size:13px}
.hdr{background:linear-gradient(135deg,#1a1a2e,#16213e,#0f3460);padding:14px;border-bottom:1px solid var(--bord)}
.hdr h1{font-size:15px;font-weight:700;background:linear-gradient(90deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hdr p{font-size:10px;color:var(--muted);margin-top:2px}
.sec{padding:10px 14px;border-bottom:1px solid var(--bord)}
.sec-title{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.sec-title::after{content:'';flex:1;height:1px;background:var(--bord)}
.btn{width:100%;padding:9px 12px;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:8px;margin-bottom:6px;transition:all .15s}
.btn-p{background:linear-gradient(135deg,#6c63ff,#5a52d5);color:#fff;box-shadow:0 3px 12px rgba(108,99,255,.35)}
.btn-p:hover{transform:translateY(-1px)}
.btn-r{background:linear-gradient(135deg,#ff6b6b,#ee5a5a);color:#fff;box-shadow:0 3px 12px rgba(255,107,107,.3)}
.btn-g{background:linear-gradient(135deg,#43e97b,#38d66e);color:#0f0f13;box-shadow:0 3px 12px rgba(67,233,123,.3)}
.btn-o{background:var(--surf2);color:var(--txt);border:1px solid var(--bord)}
.ifield{width:100%;background:var(--surf2);border:1px solid var(--bord);border-radius:8px;color:var(--txt);font-size:12px;padding:8px 10px;outline:none;margin-bottom:6px}
.ifield:focus{border-color:var(--acc)}
.row{display:flex;gap:6px;margin-bottom:6px}
.row .ifield{margin-bottom:0}
.btn-sm{width:auto;padding:8px 12px;margin:0;white-space:nowrap}
.tags{display:flex;flex-wrap:wrap;gap:5px;min-height:24px;margin-top:4px}
.tag{background:var(--surf2);border:1px solid var(--bord);border-radius:20px;padding:3px 10px;font-size:11px;cursor:pointer;transition:all .15s}
.tag:hover,.tag.on{background:var(--acc);border-color:var(--acc);color:#fff}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--surf2);border:1px solid var(--bord);border-radius:10px;padding:9px 16px;font-size:12px;z-index:9999;transition:transform .25s;white-space:nowrap;box-shadow:0 8px 32px rgba(0,0,0,.4)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:var(--acc3)} .toast.er{border-color:var(--acc2)} .toast.in{border-color:var(--acc)}
.spin{display:inline-block;width:13px;height:13px;border:2px solid var(--bord);border-top-color:var(--acc);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.lbl{font-size:11px;color:var(--muted);margin-bottom:5px}
.lbl span{color:#a78bfa;font-weight:600}
</style>
</head>
<body>

<div class="hdr">
  <h1>✦ TextFormatter Pro</h1>
  <p>Formatação ABNT · Sinônimos · Word for Mac</p>
</div>

<!-- FORMATAÇÃO -->
<div class="sec">
  <div class="sec-title">Formatação</div>
  <button class="btn btn-p" onclick="runParagraphs()"><span>¶</span> Parágrafos (1,25cm · Esp. 1,5)</button>
  <button class="btn btn-r" onclick="runQuotes()"><span>❝</span> Citações (Recuo 1cm · Simples)</button>
  <button class="btn btn-o" onclick="runFont()"><span>A</span> Helvetica Neue 12pt</button>
  <button class="btn btn-g" onclick="runAll()"><span>✓</span> Aplicar Tudo</button>
</div>

<!-- SINÔNIMOS -->
<div class="sec">
  <div class="sec-title">Sinônimos</div>
  <div class="lbl">Palavra selecionada: <span id="selWord">—</span></div>
  <div class="row">
    <input class="ifield" id="synInput" placeholder="Digite ou selecione uma palavra..."/>
    <button class="btn btn-p btn-sm" onclick="getSyn()">Buscar</button>
  </div>
  <div id="synLoad" style="display:none;font-size:11px;color:var(--muted);padding:4px 0"><span class="spin"></span> Buscando...</div>
  <div class="tags" id="synTags"><span style="color:var(--muted);font-size:11px">Sinônimos aparecerão aqui...</span></div>
</div>

<!-- SUBSTITUIR -->
<div class="sec">
  <div class="sec-title">Substituir</div>
  <div class="row">
    <input class="ifield" id="repOld" placeholder="Palavra original"/>
    <input class="ifield" id="repNew" placeholder="Substituir por"/>
  </div>
  <button class="btn btn-o" onclick="doReplace()"><span>↔</span> Substituir</button>
</div>

<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
Office.onReady(function(info){
  if(info.host === Office.HostType.Word){
    setInterval(detectSelection, 2000);
  }
});

async function detectSelection(){
  try {
    await Word.run(async ctx => {
      const s = ctx.document.getSelection();
      s.load('text');
      await ctx.sync();
      const t = s.text.trim();
      if(t && t.split(' ').length <= 5 && t.length < 80){
        document.getElementById('selWord').textContent = t;
        document.getElementById('synInput').value = t;
      }
    });
  } catch(e){}
}

// ─────────────────────────────────────────────
// TOAST
// ─────────────────────────────────────────────
let _tt;
function toast(msg, type='in'){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show ' + type;
  clearTimeout(_tt);
  _tt = setTimeout(()=> el.classList.remove('show'), 3000);
}

// ─────────────────────────────────────────────
// APLICAR FONTE
// ─────────────────────────────────────────────
async function runFont(){
  try {
    await Word.run(async ctx => {
      ctx.document.body.font.name = 'Helvetica Neue';
      ctx.document.body.font.size = 12;
      await ctx.sync();
      toast('✓ Fonte aplicada!', 'ok');
    });
  } catch(e){ toast('Erro fonte: ' + e.message, 'er'); }
}

// ─────────────────────────────────────────────
// FORMATAR PARÁGRAFOS
// Recuo 1ª linha 1,25cm · Esp. 1,5 · Justificado · Antes/Depois = 0
// ─────────────────────────────────────────────
async function runParagraphs(){
  try {
    await Word.run(async ctx => {
      const body = ctx.document.body;
      const paras = body.paragraphs;
      paras.load('items');
      await ctx.sync();

      for(const p of paras.items){
        p.firstLineIndent = 35.43;   // 1,25 cm → pontos (1cm = 28.35pt)
        p.leftIndent      = 0;
        p.rightIndent     = 0;
        p.lineSpacing     = 18;      // 1,5 × 12pt
        p.spaceBefore     = 0;
        p.spaceAfter      = 0;
        p.alignment       = Word.Alignment.justified;
      }
      await ctx.sync();
      toast('✓ Parágrafos formatados!', 'ok');
    });
  } catch(e){ toast('Erro parágrafo: ' + e.message, 'er'); }
}

// ─────────────────────────────────────────────
// FORMATAR CITAÇÕES
// Recuo esq/dir 1cm · Esp. Simples · Justificado · Sem recuo 1ª linha
// ─────────────────────────────────────────────
async function runQuotes(){
  try {
    await Word.run(async ctx => {
      const sel = ctx.document.getSelection();
      sel.load('text');
      await ctx.sync();

      if(!sel.text || !sel.text.trim()){
        toast('Selecione o texto da citação primeiro.', 'in');
        return;
      }

      const paras = sel.paragraphs;
      paras.load('items');
      await ctx.sync();

      for(const p of paras.items){
        p.firstLineIndent = 0;
        p.leftIndent      = 28.35;   // 1 cm
        p.rightIndent     = 28.35;   // 1 cm
        p.lineSpacing     = 12;      // simples = 1 × 12pt
        p.spaceBefore     = 0;
        p.spaceAfter      = 0;
        p.alignment       = Word.Alignment.justified;
      }
      await ctx.sync();
      toast('✓ Citação formatada!', 'ok');
    });
  } catch(e){ toast('Erro citação: ' + e.message, 'er'); }
}

// ─────────────────────────────────────────────
// APLICAR TUDO
// ─────────────────────────────────────────────
async function runAll(){
  try {
    await Word.run(async ctx => {
      const body = ctx.document.body;
      body.font.name = 'Helvetica Neue';
      body.font.size = 12;

      const paras = body.paragraphs;
      paras.load('items');
      await ctx.sync();

      for(const p of paras.items){
        p.firstLineIndent = 35.43;
        p.leftIndent      = 0;
        p.rightIndent     = 0;
        p.lineSpacing     = 18;
        p.spaceBefore     = 0;
        p.spaceAfter      = 0;
        p.alignment       = Word.Alignment.justified;
      }
      await ctx.sync();
      toast('✓ Tudo aplicado!', 'ok');
    });
  } catch(e){ toast('Erro: ' + e.message, 'er'); }
}

// ─────────────────────────────────────────────
// SINÔNIMOS
// ─────────────────────────────────────────────
async function getSyn(){
  const word = document.getElementById('synInput').value.trim();
  if(!word){ toast('Digite uma palavra.','in'); return; }

  document.getElementById('synLoad').style.display = 'block';
  document.getElementById('synTags').innerHTML = '';

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:300,
        system:'Responda APENAS com JSON puro sem markdown: {"s":["sin1","sin2",...]} com 8 a 12 sinônimos em português.',
        messages:[{role:'user',content:'Sinônimos de: '+word}]
      })
    });
    const d = await res.json();
    const txt = d.content.map(i=>i.text||'').join('');
    const obj = JSON.parse(txt.replace(/```json|```/g,'').trim());
    renderSyn(obj.s||[], word);
  } catch(e){
    renderSyn(fallbackSyn(word), word);
  } finally {
    document.getElementById('synLoad').style.display = 'none';
  }
}

function fallbackSyn(w){
  const m={
    'bom':['ótimo','excelente','admirável','primoroso','notável','superior'],
    'ruim':['péssimo','terrível','deficiente','precário','inferior'],
    'grande':['enorme','vasto','amplo','colossal','extenso','majestoso'],
    'pequeno':['diminuto','minúsculo','ínfimo','reduzido','exíguo'],
    'importante':['essencial','fundamental','crucial','relevante','primordial'],
  };
  return m[w.toLowerCase()]||['similar','análogo','equivalente','correlato','afim','semelhante'];
}

function renderSyn(list, original){
  const wrap = document.getElementById('synTags');
  wrap.innerHTML = '';
  if(!list.length){
    wrap.innerHTML='<span style="color:var(--muted);font-size:11px">Nenhum resultado.</span>';
    return;
  }
  list.forEach(s=>{
    const t = document.createElement('span');
    t.className='tag'; t.textContent=s;
    t.onclick=()=> insertSyn(s, original, t);
    wrap.appendChild(t);
  });
}

async function insertSyn(syn, original, el){
  document.querySelectorAll('.tag').forEach(t=>t.classList.remove('on'));
  el.classList.add('on');
  try {
    await Word.run(async ctx=>{
      const sel = ctx.document.getSelection();
      sel.load('text');
      await ctx.sync();
      if(sel.text.trim().toLowerCase()===original.toLowerCase()){
        sel.insertText(syn, Word.InsertLocation.replace);
      } else {
        const r = ctx.document.body.search(original,{matchCase:false,matchWholeWord:true});
        r.load('items');
        await ctx.sync();
        if(r.items.length) r.items[0].insertText(syn, Word.InsertLocation.replace);
      }
      await ctx.sync();
      toast('✓ '+original+' → '+syn,'ok');
    });
  } catch(e){ toast('Selecione a palavra no texto.','in'); }
}

// ─────────────────────────────────────────────
// SUBSTITUIR
// ─────────────────────────────────────────────
async function doReplace(){
  const orig = document.getElementById('repOld').value.trim();
  const sub  = document.getElementById('repNew').value.trim();
  if(!orig||!sub){ toast('Preencha os dois campos.','in'); return; }
  try {
    await Word.run(async ctx=>{
      const r = ctx.document.body.search(orig,{matchCase:false,matchWholeWord:true});
      r.load('items');
      await ctx.sync();
      if(!r.items.length){ toast('Palavra não encontrada.','er'); return; }
      r.items[0].insertText(sub, Word.InsertLocation.replace);
      await ctx.sync();
      toast('✓ Substituído!','ok');
    });
  } catch(e){ toast('Erro: '+e.message,'er'); }
}
</script>
</body>
</html>
